<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="assets/cart.png">
    <title>Lista de Compras</title>
</head>
<body>
    <header>
        <div>
            <a href="index.html">Lista de Compras</a>
            <div id="contElem">
                <p>0 itens</p>
            </div>
        </div>
    </header>

    <main>

        <dialog id="addItem">
            <div>
                <p>Adicionar item</p>
                <button id="closeAddItem1">x</button>
            </div>
            <div>
                <form>
                    <label for="itemName">NOME DO ITEM</label>
                    <input type="text" id="itemName" name="itemName" required placeholder="Ex: Leite integral">

                    <label for="qtd">QUANTIDADE (OPCIONAL)</label>
                    <input type="number" id="qtd" name="qtd" required placeholder="Ex: 2 unidades, 500g...">
                </form>
            </div>
            <div>
                <button id="closeAddItem2">Cancelar</button>
                <button>Adicionar</button>
            </div>
        </dialog>

        <section>
            <div id="texts">
                <img src="assets/cart.png" alt="Ícone de carrinho de compras">
                <h1>Nenhum item na lista ainda</h1>
                <p>Toque em "+ Adicionar item" para começar</p>
            </div>

            <div id="buttons">
                <button id="add">+ Adicionar item</button>
                <button id="edit"><img src="assets/edit.png" alt="Ícone de editar lista">Editar lista</button>

            </div>
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
